<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>AI Chat | bill74186</title>
	<link rel="icon" href="./favicon.ico" type="image/x-icon">
</head>
<body>
<div class="top-bar">
	<a href="../">AI Chat</a>
</div>
<div id="chat"></div>
<div class="input-bar">
	<input type="text" id="userInput" placeholder="Type your message..." /><button id="sendButton">↑</button>
</div>
<script>
	document.getElementById("sendButton").onclick = function() {
		const userInput = document.getElementById("userInput").value;
		if (userInput.trim() === "") return;
		const chatDiv = document.getElementById("chat");
		chatDiv.innerHTML += `<div class="msg user">${userInput}</div>`;
		document.getElementById("userInput").value = "";
		const thinkingMessage = document.createElement('div');
		thinkingMessage.className = 'thinking';
		thinkingMessage.innerText = 'Thinking...';
		chatDiv.appendChild(thinkingMessage);
		window.scrollTo(0, document.body.scrollHeight);
		fetch(`https://api.52vmy.cn/api/chat/glm?msg=${encodeURIComponent(userInput)}`)
			.then(response => response.json())
			.then(data => {
				const aiFullText = data.data && data.data.answer ? data.data.answer : "Sorry, due to restrictions, please try again later.";
				chatDiv.removeChild(thinkingMessage);
				const aiMessageDiv = document.createElement('div');
				aiMessageDiv.className = 'msg ai';
				chatDiv.appendChild(aiMessageDiv);
				window.scrollTo(0, document.body.scrollHeight);
				let currentText = "";
				let index = 0;
				const typingEffect = setInterval(() => {
					if (index < aiFullText.length) {
						currentText += aiFullText.charAt(index);
						aiMessageDiv.innerText = currentText;
						window.scrollTo(0, document.body.scrollHeight);
						index++;
					} else {
						clearInterval(typingEffect);
					}
				}, 10);
			})
			.catch(error => {
				console.error('Error:', error);
				chatDiv.removeChild(thinkingMessage);
				chatDiv.innerHTML += `<div class="msg ai">An error occurred, please try again later.</div>`;
				window.scrollTo(0, document.body.scrollHeight);
			});
	};
	document.getElementById("userInput").addEventListener("keydown", function(e){
		if(e.key === "Enter"){
			document.getElementById("sendButton").click();
		}
	})
</script>
</body>
</html>
